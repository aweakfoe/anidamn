<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Analyzer</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- chessboard.js CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="errorOverlay" style="display:none; background:red; color:white; padding:10px; position:absolute; top:0; left:0; right:0; z-index:9999;"></div>
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            var overlay = document.getElementById('errorOverlay');
            overlay.style.display = 'block';
            overlay.innerHTML += '<p>' + msg + ' at line ' + lineNo + '</p>';
            return false;
        };
    </script>
    <div class="app-container">
        <header>
            <h1>Chess Analyzer</h1>
        </header>
        
        <main class="main-content">
            <div class="board-area">
                <div class="eval-container">
                    <div class="eval-bar" id="evalBar">
                        <div class="eval-fill" id="evalFill"></div>
                        <span class="eval-score" id="evalScore">0.0</span>
                    </div>
                </div>
                <div id="board" class="chessboard"></div>
            </div>
            
            <aside class="sidebar">
                <div class="panel">
                    <h2>Game Controls</h2>
                    <div class="controls">
                        <button id="btnStart" title="First Move">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5"></line></svg>
                        </button>
                        <button id="btnPrev" title="Previous Move">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="15 18 9 12 15 6 15 18"></polygon></svg>
                        </button>
                        <button id="btnNext" title="Next Move">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="9 18 15 12 9 6 9 18"></polygon></svg>
                        </button>
                        <button id="btnEnd" title="Last Move">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>
                        </button>
                        <button id="btnFlip" title="Flip Board">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>
                        </button>
                    </div>
                </div>
                
                <div class="panel">
                    <h2>Engine Evaluation</h2>
                    <div class="engine-info">
                        <div id="engineStatus">Loading Stockfish...</div>
                        <div class="best-move" id="bestMove">Best move: -</div>
                    </div>
                </div>

                <div class="panel move-list-container">
                    <h2>Move List</h2>
                    <div id="moveList" class="move-list"></div>
                </div>

                <div class="panel">
                    <h2>Import PGN</h2>
                    <textarea id="pgnInput" placeholder="Paste PGN here..."></textarea>
                    <button id="btnLoadPgn" class="primary-btn">Load Game</button>
                </div>
            </aside>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
